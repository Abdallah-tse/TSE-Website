<!DOCTYPE html>
<html lang="en" dir="ltr" id="theme-html">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual Site</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/dist/css/bootstrap.min.css"
        id="bootstrap-ltr">

    <link rel="stylesheet" href="style.css">

<body>
